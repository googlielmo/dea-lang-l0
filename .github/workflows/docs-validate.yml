name: Validate Documentation

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "compiler/stage1_py/**"
      - "compiler/docgen/**"
      - "compiler/stage2_l0/**"
      - "compiler/shared/**"
      - "docs/**"
      - "README.md"
      - "CLAUDE.md"
      - "pyproject.toml"
      - "scripts/docs/**"
      - "scripts/gen-docs.sh"
      - "uv.lock"
  workflow_dispatch:
  push:
    branches:
      - main
      - dea-dev
    paths:
      - ".github/workflows/**"
      - "compiler/stage1_py/**"
      - "compiler/docgen/**"
      - "compiler/stage2_l0/**"
      - "compiler/shared/**"
      - "docs/**"
      - "README.md"
      - "CLAUDE.md"
      - "pyproject.toml"
      - "scripts/docs/**"
      - "scripts/gen-docs.sh"
      - "uv.lock"

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: docs-py3.14

      - name: Install docs toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz make

      - name: Sync docs dependencies
        run: uv sync --group docs

      - name: Build docs strictly
        run: ./scripts/gen-docs.sh --strict

      - name: Show undocumented functions report
        run: cat build/docs/undocumented-functions.txt

      - name: Export Chirpy Markdown
        run: |
          python -m compiler.docgen.l0_docgen_blog \
            --input build/docs/markdown \
            --output build/docs/blog-export
