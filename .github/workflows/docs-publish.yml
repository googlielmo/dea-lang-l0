name: Publish Documentation

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_pages:
        description: "Deploy standalone HTML + PDF to GitHub Pages"
        required: true
        default: true
        type: boolean
      publish_blog:
        description: "Sync generated API pages into the Chirpy blog repo"
        required: true
        default: false
        type: boolean
      upload_pdf_to_release:
        description: "Upload refman.pdf to an existing release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag for manual PDF upload"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: docs-publish
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: docs-publish-py3.14

      - name: Install docs and TeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz \
            make \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Sync docs dependencies
        run: uv sync --group docs

      - name: Build HTML, Markdown, LaTeX, and PDF
        run: ./scripts/gen-docs.sh --pdf --strict

      - name: Stage Pages site
        run: |
          rm -rf build/docs/pages-site
          mkdir -p build/docs/pages-site
          cp -R build/docs/html/. build/docs/pages-site/
          mkdir -p build/docs/pages-site/pdf
          cp build/docs/pdf/refman.pdf build/docs/pages-site/pdf/refman.pdf
          touch build/docs/pages-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/docs/pages-site

      - name: Upload generated Markdown artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-markdown
          path: build/docs/markdown

      - name: Upload generated PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-pdf
          path: build/docs/pdf/refman.pdf

  deploy-pages:
    needs: build-docs
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_pages)
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  upload-release-pdf:
    needs: build-docs
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.upload_pdf_to_release)
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: docs-pdf
          path: build/docs/pdf

      - name: Resolve release tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "TARGET_RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "$INPUT_RELEASE_TAG" ]; then
            echo "Error: release_tag is required when upload_pdf_to_release=true on workflow_dispatch." >&2
            exit 1
          fi
          echo "TARGET_RELEASE_TAG=$INPUT_RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Upload PDF to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TARGET_RELEASE_TAG" build/docs/pdf/refman.pdf --clobber

  sync-blog:
    needs:
      - build-docs
      - deploy-pages
    if: >-
      always() &&
      needs.build-docs.result == 'success' &&
      (needs.deploy-pages.result == 'success' || needs.deploy-pages.result == 'skipped') &&
      (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish_blog))
    runs-on: ubuntu-latest
    env:
      BLOG_REPO: ${{ vars.BLOG_REPO }}
      BLOG_BRANCH: ${{ vars.BLOG_BRANCH }}
      BLOG_DOCS_PREFIX: ${{ vars.BLOG_DOCS_PREFIX }}
      BLOG_TAB_TITLE: ${{ vars.BLOG_TAB_TITLE }}
      BLOG_TAB_ICON: ${{ vars.BLOG_TAB_ICON }}
      BLOG_TAB_ORDER: ${{ vars.BLOG_TAB_ORDER }}
      DOCS_SITE_URL_OVERRIDE: ${{ vars.DOCS_SITE_URL }}
      PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Validate blog sync configuration
        run: |
          if [ -z "$BLOG_REPO" ]; then
            echo "Error: repository variable BLOG_REPO is required." >&2
            exit 1
          fi
          if [ -z "${{ secrets.BLOG_PUSH_TOKEN }}" ]; then
            echo "Error: secret BLOG_PUSH_TOKEN is required." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download generated Markdown
        uses: actions/download-artifact@v6
        with:
          name: docs-markdown
          path: build/docs/markdown

      - name: Check out blog repository
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.BLOG_REPO }}
          ref: ${{ vars.BLOG_BRANCH || 'main' }}
          token: ${{ secrets.BLOG_PUSH_TOKEN }}
          path: blog-repo

      - name: Export Chirpy API pages
        run: |
          docs_prefix="${BLOG_DOCS_PREFIX:-api/reference}"
          tab_title="${BLOG_TAB_TITLE:-API}"
          tab_icon="${BLOG_TAB_ICON:-fas fa-book}"
          tab_order="${BLOG_TAB_ORDER:-5}"
          if [ -n "$PAGE_URL" ]; then
            html_site_url="$PAGE_URL"
          elif [ -n "$DOCS_SITE_URL_OVERRIDE" ]; then
            html_site_url="$DOCS_SITE_URL_OVERRIDE"
          else
            html_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          fi
          pdf_url="${html_site_url%/}/pdf/refman.pdf"
          python -m compiler.docgen.l0_docgen_blog \
            --input build/docs/markdown \
            --output build/docs/blog-export \
            --docs-prefix "$docs_prefix" \
            --tab-title "$tab_title" \
            --tab-icon "$tab_icon" \
            --tab-order "$tab_order" \
            --html-site-url "$html_site_url" \
            --pdf-url "$pdf_url"
          echo "RESOLVED_DOCS_PREFIX=$docs_prefix" >> "$GITHUB_ENV"

      - name: Sync exported API pages into blog repo
        run: |
          rm -f "blog-repo/_tabs/api.md"
          rm -rf "blog-repo/$RESOLVED_DOCS_PREFIX"
          mkdir -p "blog-repo/_tabs"
          mkdir -p "blog-repo/$(dirname "$RESOLVED_DOCS_PREFIX")"
          cp build/docs/blog-export/_tabs/api.md blog-repo/_tabs/api.md
          cp -R "build/docs/blog-export/$RESOLVED_DOCS_PREFIX" "blog-repo/$RESOLVED_DOCS_PREFIX"

      - name: Commit and push blog update
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          cd blog-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _tabs/api.md "$RESOLVED_DOCS_PREFIX"
          if git diff --cached --quiet; then
            echo "No blog changes to commit."
            exit 0
          fi
          if [ "$EVENT_NAME" = "release" ]; then
            message="Sync API docs from L0 $RELEASE_TAG (${GITHUB_SHA})"
          else
            message="Sync API docs from L0 manual publish (${GITHUB_SHA})"
          fi
          git commit -m "$message"
          git push origin HEAD
