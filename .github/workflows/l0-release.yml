name: L0 Release

on:
  push:
    tags:
      - "l0-v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-pages-availability:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.probe.outputs.pages_enabled }}
    steps:
      - name: Check GitHub Pages availability
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/pages" >/dev/null 2>&1; then
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GitHub Pages is unavailable or not activated for $GITHUB_REPOSITORY; skipping Pages deployment."
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  build-dist:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            c_compiler: gcc
          - runner: macos-15-intel
            os: darwin
            arch: x86_64
            c_compiler: clang
          - runner: macos-latest
            os: darwin
            arch: arm64
            c_compiler: clang
          - runner: windows-latest
            os: windows
            arch: x86_64
            c_compiler: gcc
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: l0
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        if: matrix.os != 'windows'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        if: matrix.os != 'windows'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: release-${{ matrix.os }}-${{ matrix.arch }}-py3.14

      - name: Install Linux build toolchain
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang make

      - name: Set up MSYS2 UCRT64 toolchain with MSYS2 Python
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          install: >-
            make
            diffutils
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-uv

      - name: Show Windows environment
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          printf 'MSYSTEM=%s\n' "${MSYSTEM:-}"
          command -v python
          python -VV
          command -v uv || true
          uv --version || true
          command -v "${{ matrix.c_compiler }}"
          "${{ matrix.c_compiler }}" --version | head -n 1

      - name: Smoke-test examples
        if: runner.os != 'Windows'
        env:
          L0_CC: ${{ matrix.c_compiler }}
        run: |
          make check-examples

      - name: Smoke-test examples
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          L0_CC: ${{ matrix.c_compiler }}
          PYTHON: python
        run: |
          make check-examples

      - name: Build distribution archive
        if: runner.os != 'Windows'
        env:
          L0_CC: ${{ matrix.c_compiler }}
          DEA_BUILD_ID: gha-${{ github.run_id }}.${{ github.run_attempt }}-release-${{ matrix.os }}-${{ matrix.arch }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build
          export DEA_DIST_VERSION="${RELEASE_VERSION#l0-v}"
          make dist | tee build/dist.log

      - name: Build distribution archive
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          L0_CC: ${{ matrix.c_compiler }}
          PYTHON: python
          DEA_BUILD_ID: gha-${{ github.run_id }}.${{ github.run_attempt }}-release-${{ matrix.os }}-${{ matrix.arch }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p build
          export DEA_DIST_VERSION="${RELEASE_VERSION#l0-v}"
          make dist | tee build/dist.log

      - name: Resolve distribution archive path
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          log_path = Path("build/dist.log")
          text = log_path.read_text(encoding="utf-8")
          match = re.search(r"created distribution archive at (.+)", text)
          if match is None:
              raise SystemExit(f"could not parse distribution archive from {log_path}")
          archive_path = Path(match.group(1).strip())
          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as handle:
              handle.write(f"DIST_ARCHIVE_PATH={archive_path.as_posix()}\n")
              handle.write(f"DIST_ARCHIVE_NAME={archive_path.name}\n")
          PY

      - name: Resolve distribution archive path
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          log_path = Path("build/dist.log")
          text = log_path.read_text(encoding="utf-8")
          match = re.search(r"created distribution archive at (.+)", text)
          if match is None:
              raise SystemExit(f"could not parse distribution archive from {log_path}")
          archive_path = Path(match.group(1).strip())
          github_env = Path(os.environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as handle:
              handle.write(f"DIST_ARCHIVE_PATH={archive_path.as_posix()}\n")
              handle.write(f"DIST_ARCHIVE_NAME={archive_path.name}\n")
          PY

      - name: Smoke-test distribution archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import sys
          import tarfile
          import tempfile
          import zipfile

          archive_path = Path(os.environ["DIST_ARCHIVE_PATH"])
          if not archive_path.is_file():
              raise SystemExit(f"missing archive: {archive_path}")

          smoke_root = Path(tempfile.mkdtemp(prefix="release-smoke.", dir="build"))
          try:
              if archive_path.suffix == ".zip":
                  with zipfile.ZipFile(archive_path) as archive:
                      archive.extractall(smoke_root)
              else:
                  with tarfile.open(archive_path, "r:gz") as archive:
                      archive.extractall(smoke_root)

              dist_root = smoke_root / "dea-l0"
              version_path = dist_root / "VERSION"
              if not version_path.is_file():
                  raise SystemExit(f"missing VERSION file in {dist_root}")
              version_text = version_path.read_text(encoding="utf-8")
              for key in ("name:", "version:", "build:", "commit:", "os:", "arch:", "author:", "license:", "source:"):
                  if key not in version_text:
                      raise SystemExit(f"missing {key!r} in VERSION file:\n{version_text}")

              for expected in ["README.md", "examples", "docs/project-status.md", "docs/reference", "docs/reference/grammar.md"]:
                  if not (dist_root / expected).exists():
                      raise SystemExit(f"missing expected path in dist: {dist_root / expected}")
              windows_readme = dist_root / "README-WINDOWS.md"
              if archive_path.suffix == ".zip":
                  if not windows_readme.is_file():
                      raise SystemExit(f"missing expected path in dist: {windows_readme}")
              elif windows_readme.exists():
                  raise SystemExit(f"unexpected path in dist: {windows_readme}")
              for unexpected in [
                  "CONTRIBUTING.md",
                  "docs/user",
                  "docs/reference/project-status.md",
                  "docs/reference/blog-poll-workflow.yml",
                  "docs/reference/grammar/l0.md",
              ]:
                  if (dist_root / unexpected).exists():
                      raise SystemExit(f"unexpected path in dist: {dist_root / unexpected}")
              readme_text = (dist_root / "README.md").read_text(encoding="utf-8")
              for unexpected in ["MONOREPO.md", "CONTRIBUTING.md", "compiler/stage2_l0/README.md", "cd` into `l0/"]:
                  if unexpected in readme_text:
                      raise SystemExit(f"unexpected README content in dist: {unexpected}")

              launcher = dist_root / "bin" / "l0c"
              if os.name == "nt":
                  launcher = launcher.with_suffix(".cmd")
              completed = subprocess.run(
                  [str(launcher), "--version"],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  encoding="utf-8",
                  errors="replace",
              )
              if completed.returncode != 0:
                  raise SystemExit(completed.stdout)
              sys.stdout.write(completed.stdout)
          finally:
              pass
          PY

      - name: Smoke-test distribution archive
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import subprocess
          import sys
          import tarfile
          import tempfile
          import zipfile

          archive_path = Path(os.environ["DIST_ARCHIVE_PATH"])
          if not archive_path.is_file():
              raise SystemExit(f"missing archive: {archive_path}")

          smoke_root = Path(tempfile.mkdtemp(prefix="release-smoke.", dir="build"))
          try:
              if archive_path.suffix == ".zip":
                  with zipfile.ZipFile(archive_path) as archive:
                      archive.extractall(smoke_root)
              else:
                  with tarfile.open(archive_path, "r:gz") as archive:
                      archive.extractall(smoke_root)

              dist_root = smoke_root / "dea-l0"
              version_path = dist_root / "VERSION"
              if not version_path.is_file():
                  raise SystemExit(f"missing VERSION file in {dist_root}")
              version_text = version_path.read_text(encoding="utf-8")
              for key in ("name:", "version:", "build:", "commit:", "os:", "arch:", "author:", "license:", "source:"):
                  if key not in version_text:
                      raise SystemExit(f"missing {key!r} in VERSION file:\n{version_text}")

              for expected in ["README.md", "examples", "docs/project-status.md", "docs/reference", "docs/reference/grammar.md"]:
                  if not (dist_root / expected).exists():
                      raise SystemExit(f"missing expected path in dist: {dist_root / expected}")
              windows_readme = dist_root / "README-WINDOWS.md"
              if archive_path.suffix == ".zip":
                  if not windows_readme.is_file():
                      raise SystemExit(f"missing expected path in dist: {windows_readme}")
              elif windows_readme.exists():
                  raise SystemExit(f"unexpected path in dist: {windows_readme}")
              for unexpected in [
                  "CONTRIBUTING.md",
                  "docs/user",
                  "docs/reference/project-status.md",
                  "docs/reference/blog-poll-workflow.yml",
                  "docs/reference/grammar/l0.md",
              ]:
                  if (dist_root / unexpected).exists():
                      raise SystemExit(f"unexpected path in dist: {dist_root / unexpected}")
              readme_text = (dist_root / "README.md").read_text(encoding="utf-8")
              for unexpected in ["MONOREPO.md", "CONTRIBUTING.md", "compiler/stage2_l0/README.md", "cd` into `l0/"]:
                  if unexpected in readme_text:
                      raise SystemExit(f"unexpected README content in dist: {unexpected}")

              launcher = dist_root / "bin" / "l0c"
              if os.name == "nt":
                  launcher = launcher.with_suffix(".cmd")
              completed = subprocess.run(
                  [str(launcher), "--version"],
                  check=False,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  encoding="utf-8",
                  errors="replace",
              )
              if completed.returncode != 0:
                  raise SystemExit(completed.stdout)
              sys.stdout.write(completed.stdout)
          finally:
              pass
          PY

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v6
        with:
          name: dea-l0-dist-${{ matrix.os }}-${{ matrix.arch }}
          path: l0/${{ env.DIST_ARCHIVE_PATH }}

  build-docs:
    uses: ./.github/workflows/l0-docs-build.yml
    with:
      source_ref: ${{ github.ref_name }}
      release_tag: ${{ github.ref_name }}

  deploy-pages:
    needs:
      - check-pages-availability
      - build-docs
    if: needs.check-pages-availability.outputs.pages_enabled == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    needs: [build-dist, build-docs]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l0
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: dea-l0-dist-*
          merge-multiple: true
          path: l0/build/release-assets

      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: docs-pdf
          path: l0/build/release-assets

      - name: Generate checksums
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          cd build/release-assets
          pdf_name="dea_l0_api_reference-$CURRENT_TAG.pdf"
          mv dea_l0_api_reference.pdf "$pdf_name"
          sha256sum ./*.tar.gz ./*.zip "$pdf_name" > SHA256SUMS

      - name: Generate release notes
        env:
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          prev_tag="$(git tag --merged HEAD --sort=-v:refname | grep '^l0-v' | grep -Fxv "$CURRENT_TAG" | head -n 1 || true)"
          if [ -z "$prev_tag" ]; then
            prev_tag="$(git tag --merged HEAD --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
          fi
          if [ -n "$prev_tag" ]; then
            git log --pretty=format:'- %s (%h)' "$prev_tag..$CURRENT_TAG" > build/release-notes.md
          else
            git log --pretty=format:'- %s (%h)' "$CURRENT_TAG" > build/release-notes.md
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$CURRENT_TAG" >/dev/null 2>&1; then
            gh release upload "$CURRENT_TAG" build/release-assets/* --clobber
            gh release edit "$CURRENT_TAG" --title "$CURRENT_TAG" --notes-file build/release-notes.md
          else
            gh release create "$CURRENT_TAG" build/release-assets/* --title "$CURRENT_TAG" --notes-file build/release-notes.md
          fi

  upload-blog-export:
    needs:
      - build-docs
      - publish-release
    if: >-
      always() &&
      needs.build-docs.result == 'success' &&
      needs.publish-release.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l0
    env:
      GH_TOKEN: ${{ github.token }}
      BLOG_DOCS_PREFIX: ${{ vars.BLOG_DOCS_PREFIX }}
      BLOG_TAB_TITLE: ${{ vars.BLOG_TAB_TITLE }}
      BLOG_TAB_ICON: ${{ vars.BLOG_TAB_ICON }}
      BLOG_TAB_ORDER: ${{ vars.BLOG_TAB_ORDER }}
      DOCS_SITE_URL_OVERRIDE: ${{ vars.DOCS_SITE_URL }}
      CURRENT_TAG: ${{ github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download generated Markdown
        uses: actions/download-artifact@v6
        with:
          name: docs-markdown
          path: l0/build/docs/markdown

      - name: Export Chirpy API pages
        run: |
          docs_prefix="${BLOG_DOCS_PREFIX:-api/reference}"
          tab_title="${BLOG_TAB_TITLE:-API}"
          tab_icon="${BLOG_TAB_ICON:-fas fa-book}"
          tab_order="${BLOG_TAB_ORDER:-5}"
          if [ -n "$DOCS_SITE_URL_OVERRIDE" ]; then
            html_site_url="$DOCS_SITE_URL_OVERRIDE"
          else
            html_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          fi
          pdf_asset=$(gh release view "$CURRENT_TAG" --json assets \
            -q '.assets[] | select(.name | endswith(".pdf")) | .name' \
            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true)
          if [ -n "$pdf_asset" ]; then
            pdf_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${CURRENT_TAG}/${pdf_asset}"
          else
            pdf_url="${html_site_url%/}/pdf/dea_l0_api_reference.pdf"
          fi
          python -m compiler.docgen.l0_docgen_blog \
            --input build/docs/markdown \
            --output build/docs/blog-export \
            --docs-prefix "$docs_prefix" \
            --tab-title "$tab_title" \
            --tab-icon "$tab_icon" \
            --tab-order "$tab_order" \
            --html-site-url "$html_site_url" \
            --pdf-url "$pdf_url" \
            --release-tag "$CURRENT_TAG"

      - name: Create blog export archive
        run: tar -czf blog-export.tar.gz -C build/docs/blog-export .

      - name: Upload blog export artifact
        uses: actions/upload-artifact@v6
        with:
          name: blog-export
          path: l0/blog-export.tar.gz

      - name: Upload blog export to release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: gh release upload "$CURRENT_TAG" blog-export.tar.gz --clobber --repo "$GITHUB_REPOSITORY"

      - name: Fire repository_dispatch (optional)
        if: vars.BLOG_REPO != ''
        env:
          GH_TOKEN: ${{ secrets.BLOG_PUSH_TOKEN }}
          BLOG_REPO: ${{ vars.BLOG_REPO }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::BLOG_REPO is set but BLOG_PUSH_TOKEN is missing; skipping dispatch."
            exit 0
          fi
          gh api "repos/$BLOG_REPO/dispatches" \
            -f event_type=blog-docs-update \
            -f "client_payload[release_tag]=$CURRENT_TAG" \
            -f "client_payload[source_repo]=$GITHUB_REPOSITORY" \
            -f "client_payload[source_sha]=$GITHUB_SHA"
