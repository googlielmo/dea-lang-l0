name: L0 Build Documentation

on:
  workflow_call:
    inputs:
      source_ref:
        required: false
        type: string
        default: ""
      release_tag:
        required: false
        type: string
        default: ""
      build_pdf:
        required: false
        type: boolean
        default: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l0
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: docs-build-py3.14

      - name: Install docs toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz \
            make

      - name: Install TeX toolchain
        if: inputs.build_pdf
        run: |
          sudo apt-get install -y \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Sync docs dependencies
        run: UV_PROJECT_ENVIRONMENT=../.venv uv sync --group docs

      - name: Build HTML, Markdown, LaTeX, and PDF
        env:
          L0_DOCS_RELEASE_TAG: ${{ inputs.release_tag }}
        run: python3 scripts/gen_docs.py ${{ inputs.build_pdf && '--pdf' || '' }} --strict

      - name: Stage Pages site
        run: |
          pdf_name="dea_l0_api_reference.pdf"
          rm -rf build/docs/pages-site
          mkdir -p build/docs/pages-site
          cp -R build/docs/html/. build/docs/pages-site/
          if [ -f "build/docs/pdf/$pdf_name" ]; then
            mkdir -p build/docs/pages-site/pdf
            cp "build/docs/pdf/$pdf_name" "build/docs/pages-site/pdf/$pdf_name"
          fi
          touch build/docs/pages-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: l0/build/docs/pages-site

      - name: Upload generated Markdown artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-markdown
          path: l0/build/docs/markdown

      - name: Upload generated PDF artifact
        if: inputs.build_pdf
        uses: actions/upload-artifact@v6
        with:
          name: docs-pdf
          path: l0/build/docs/pdf/dea_l0_api_reference.pdf
