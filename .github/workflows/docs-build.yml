name: Build Documentation

on:
  workflow_call:

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: docs-build-py3.14

      - name: Install docs and TeX toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            doxygen \
            graphviz \
            make \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Sync docs dependencies
        run: uv sync --group docs

      - name: Build HTML, Markdown, LaTeX, and PDF
        run: ./scripts/gen-docs.sh --pdf --strict

      - name: Stage Pages site
        run: |
          rm -rf build/docs/pages-site
          mkdir -p build/docs/pages-site
          cp -R build/docs/html/. build/docs/pages-site/
          mkdir -p build/docs/pages-site/pdf
          cp build/docs/pdf/refman.pdf build/docs/pages-site/pdf/refman.pdf
          touch build/docs/pages-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build/docs/pages-site

      - name: Upload generated Markdown artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-markdown
          path: build/docs/markdown

      - name: Upload generated PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: docs-pdf
          path: build/docs/pdf/refman.pdf
