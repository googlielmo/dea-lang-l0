name: L0 CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/l0-ci.yml
      - tools/**
      - l0/**
  pull_request:
    paths:
      - .github/workflows/l0-ci.yml
      - tools/**
      - l0/**
  workflow_dispatch:
    inputs:
      platform:
        description: Platform matrix selection
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - macos-intel
          - macos-arm64
          - windows-ucrt64-python
          - windows-mingw64-python
          - windows-native-python
      c_compiler:
        description: C compiler to use for manual Linux or Windows validation runs
        required: true
        default: gcc
        type: choice
        options:
          - gcc
          - clang
      make_target:
        description: Make target to run
        required: true
        default: test-all
        type: string

jobs:
  select-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.select.outputs.matrix }}
    steps:
      - name: Select matrix
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PLATFORM: ${{ inputs.platform }}
        run: |
          python3 - <<'PY'
          import json
          import os

          default_matrix = [
              {
                  "runner": "ubuntu-latest",
                  "os": "linux",
                  "arch": "x86_64",
                  "c_compiler": "gcc",
                  "platform": "linux",
                  "python_runtime": "hosted",
                  "msystem": "",
                  "msys2_package_prefix": "",
              },
              {
                  "runner": "macos-15-intel",
                  "os": "darwin",
                  "arch": "x86_64",
                  "c_compiler": "clang",
                  "platform": "macos-intel",
                  "python_runtime": "hosted",
                  "msystem": "",
                  "msys2_package_prefix": "",
              },
              {
                  "runner": "macos-latest",
                  "os": "darwin",
                  "arch": "arm64",
                  "c_compiler": "clang",
                  "platform": "macos-arm64",
                  "python_runtime": "hosted",
                  "msystem": "",
                  "msys2_package_prefix": "",
              },
              {
                  "runner": "windows-latest",
                  "os": "windows",
                  "arch": "x86_64",
                  "c_compiler": "gcc",
                  "platform": "windows-ucrt64-python",
                  "python_runtime": "msys2",
                  "msystem": "UCRT64",
                  "msys2_package_prefix": "mingw-w64-ucrt-x86_64",
              },
          ]
          manual_only_matrix = [
              {
                  "runner": "windows-latest",
                  "os": "windows",
                  "arch": "x86_64",
                  "c_compiler": "gcc",
                  "platform": "windows-mingw64-python",
                  "python_runtime": "msys2",
                  "msystem": "MINGW64",
                  "msys2_package_prefix": "mingw-w64-x86_64",
              },
              {
                  "runner": "windows-latest",
                  "os": "windows",
                  "arch": "x86_64",
                  "c_compiler": "gcc",
                  "platform": "windows-native-python",
                  "python_runtime": "native",
                  "msystem": "MINGW64",
                  "msys2_package_prefix": "mingw-w64-x86_64",
              },
          ]

          event_name = os.environ["EVENT_NAME"]
          requested_platform = os.environ.get("INPUT_PLATFORM", "all").strip() or "all"
          selected = default_matrix
          if event_name == "workflow_dispatch":
              dispatch_matrix = default_matrix + manual_only_matrix
              if requested_platform == "all":
                  selected = dispatch_matrix
              else:
                  selected = [entry for entry in dispatch_matrix if entry["platform"] == requested_platform]
                  if not selected:
                      raise SystemExit(f"unknown workflow_dispatch platform selection: {requested_platform}")

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as handle:
              handle.write(f"matrix={json.dumps({'include': selected}, separators=(',', ':'))}\n")
          PY

  test-all:
    needs: select-matrix
    name: test-all (${{ matrix.runner }}, ${{ matrix.os }}, ${{ matrix.arch }}, ${{ github.event_name == 'workflow_dispatch' && (matrix.os == 'linux' || matrix.os == 'windows') && inputs.c_compiler || matrix.c_compiler }}, ${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.select-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: l0
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        if: matrix.python_runtime != 'msys2'
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Select C compiler
        id: select-cc
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && { [ "${{ matrix.os }}" = "linux" ] || [ "${{ matrix.os }}" = "windows" ]; }; then
            echo "value=${{ inputs.c_compiler }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ matrix.c_compiler }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        if: matrix.python_runtime != 'msys2'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ci-${{ matrix.platform }}-${{ steps.select-cc.outputs.value }}-py3.14

      - name: Install Linux build toolchain
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang make

      - name: Set up MSYS2 toolchain with MSYS2 Python
        if: ${{ matrix.os == 'windows' && matrix.python_runtime == 'msys2' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          path-type: inherit
          install: >-
            make
            diffutils
            ${{ matrix.msys2_package_prefix }}-gcc
            ${{ matrix.msys2_package_prefix }}-clang
            ${{ matrix.msys2_package_prefix }}-python
            ${{ matrix.msys2_package_prefix }}-python-pip
            ${{ matrix.msys2_package_prefix }}-uv

      - name: Set up MSYS2 native-Python toolchain
        if: ${{ matrix.os == 'windows' && matrix.python_runtime == 'native' }}
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          install: >-
            make
            diffutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang

      - name: Show Windows environment
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: |
          printf 'platform=%s\n' '${{ matrix.platform }}'
          printf 'MSYSTEM=%s\n' "${MSYSTEM:-}"
          command -v python
          python -VV
          command -v uv || true
          uv --version || true
          command -v "${{ steps.select-cc.outputs.value }}"
          "${{ steps.select-cc.outputs.value }}" --version | head -n 1

      - name: Select Make target
        id: select-make-target
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.make_target }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=test-all" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Make target
        if: matrix.os != 'windows'
        env:
          L0_CC: ${{ steps.select-cc.outputs.value }}
        run: make ${{ steps.select-make-target.outputs.value }}

      - name: Run Make target
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          L0_CC: ${{ steps.select-cc.outputs.value }}
          PYTHON: python
        run: make ${{ steps.select-make-target.outputs.value }}

      - name: Upload workdir artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: workdir-${{ matrix.platform }}-${{ steps.select-cc.outputs.value }}
          path: |
            l0
            !l0/.git/**
          if-no-files-found: warn
          retention-days: 2
