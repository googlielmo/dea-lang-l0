name: CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      c_compiler:
        description: C compiler to use for the Linux validation run
        required: true
        default: gcc
        type: choice
        options:
          - gcc
          - clang
  # push:
  #   branches:
  #     - main

jobs:
  test-all-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang make

      - name: Select Linux C compiler
        id: select-cc
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.c_compiler }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=gcc" >> "$GITHUB_OUTPUT"
          fi

      - name: Run full validation suite
        env:
          L0_CC: ${{ steps.select-cc.outputs.value }}
        run: make test-all
