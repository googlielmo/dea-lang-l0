name: CI

on:
  pull_request:
  workflow_dispatch:
  # push:
  #   branches:
  #     - main

jobs:
  test-all-linux:
    runs-on: ubuntu-latest
    env:
      L0_CC: clang
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install Linux build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang make

      - name: Run full validation suite
        run: make test-all
