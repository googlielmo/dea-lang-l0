name: L0 Publish Documentation

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit to build docs from"
        required: false
        default: ""
        type: string
      publish_pages:
        description: "Deploy standalone HTML + PDF to GitHub Pages"
        required: true
        default: true
        type: boolean
      publish_blog:
        description: "Build and upload Chirpy blog export archive to release"
        required: true
        default: false
        type: boolean
      upload_pdf_to_release:
        description: "Upload the generated API PDF to an existing release"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag for manual PDF upload and Chirpy blog export"
        required: false
        default: ""
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: l0-docs-publish
  cancel-in-progress: false

jobs:
  resolve-targets:
    runs-on: ubuntu-latest
    outputs:
      source_ref: ${{ steps.resolve.outputs.source_ref }}
      target_release_tag: ${{ steps.resolve.outputs.target_release_tag }}
    steps:
      - name: Resolve source ref and release tag
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
          DEFAULT_REF: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "source_ref=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "target_release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          source_ref="$INPUT_REF"
          if [ -z "$source_ref" ] && [ -n "$INPUT_RELEASE_TAG" ]; then
            source_ref="$INPUT_RELEASE_TAG"
          fi
          if [ -z "$source_ref" ]; then
            source_ref="$DEFAULT_REF"
          fi

          echo "source_ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "target_release_tag=$INPUT_RELEASE_TAG" >> "$GITHUB_OUTPUT"

  check-pages-availability:
    runs-on: ubuntu-latest
    outputs:
      pages_enabled: ${{ steps.probe.outputs.pages_enabled }}
    steps:
      - name: Check GitHub Pages availability
        id: probe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/pages" >/dev/null 2>&1; then
            echo "pages_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::GitHub Pages is unavailable or not activated for $GITHUB_REPOSITORY; skipping Pages deployment."
            echo "pages_enabled=false" >> "$GITHUB_OUTPUT"
          fi

  build-docs:
    needs: resolve-targets
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'l0-v')
    uses: ./.github/workflows/l0-docs-build.yml
    with:
      source_ref: ${{ needs.resolve-targets.outputs.source_ref }}
      release_tag: ${{ needs.resolve-targets.outputs.target_release_tag }}
      build_pdf: >-
        ${{
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && (inputs.publish_pages == true || inputs.upload_pdf_to_release == true))
        }}

  deploy-pages:
    needs:
      - check-pages-availability
      - build-docs
    if: >-
      needs.check-pages-availability.outputs.pages_enabled == 'true' &&
      ((github.event_name == 'release' && startsWith(github.event.release.tag_name, 'l0-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_pages))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  upload-release-pdf:
    needs:
      - resolve-targets
      - build-docs
    if: >-
      (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'l0-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.upload_pdf_to_release)
    runs-on: ubuntu-latest
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v6
        with:
          name: docs-pdf
          path: l0/build/docs/pdf

      - name: Require target release tag
        env:
          TARGET_RELEASE_TAG: ${{ needs.resolve-targets.outputs.target_release_tag }}
        run: |
          if [ -z "$TARGET_RELEASE_TAG" ]; then
            echo "Error: release_tag is required when upload_pdf_to_release=true on workflow_dispatch." >&2
            exit 1
          fi

      - name: Upload PDF to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_RELEASE_TAG: ${{ needs.resolve-targets.outputs.target_release_tag }}
        run: |
          stable_pdf="build/docs/pdf/dea_l0_api_reference.pdf"
          release_pdf="build/docs/pdf/dea_l0_api_reference-$TARGET_RELEASE_TAG.pdf"
          cp "$stable_pdf" "$release_pdf"
          gh release upload "$TARGET_RELEASE_TAG" "$release_pdf" --clobber --repo "$GITHUB_REPOSITORY"

  upload-blog-export:
    needs:
      - resolve-targets
      - build-docs
      - deploy-pages
      - upload-release-pdf
    if: >-
      always() &&
      needs.build-docs.result == 'success' &&
      (needs.deploy-pages.result == 'success' || needs.deploy-pages.result == 'skipped') &&
      (needs.upload-release-pdf.result == 'success' || needs.upload-release-pdf.result == 'skipped') &&
      ((github.event_name == 'release' && startsWith(github.event.release.tag_name, 'l0-v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_blog))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: l0
    env:
      GH_TOKEN: ${{ github.token }}
      BLOG_DOCS_PREFIX: ${{ vars.BLOG_DOCS_PREFIX }}
      BLOG_TAB_TITLE: ${{ vars.BLOG_TAB_TITLE }}
      BLOG_TAB_ICON: ${{ vars.BLOG_TAB_ICON }}
      BLOG_TAB_ORDER: ${{ vars.BLOG_TAB_ORDER }}
      DOCS_SITE_URL_OVERRIDE: ${{ vars.DOCS_SITE_URL }}
      PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
      TARGET_RELEASE_TAG: ${{ needs.resolve-targets.outputs.target_release_tag }}
    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Download generated Markdown
        uses: actions/download-artifact@v6
        with:
          name: docs-markdown
          path: l0/build/docs/markdown

      - name: Export Chirpy API pages
        run: |
          docs_prefix="${BLOG_DOCS_PREFIX:-api/reference}"
          tab_title="${BLOG_TAB_TITLE:-API}"
          tab_icon="${BLOG_TAB_ICON:-fas fa-book}"
          tab_order="${BLOG_TAB_ORDER:-5}"
          if [ -n "$PAGE_URL" ]; then
            html_site_url="$PAGE_URL"
          elif [ -n "$DOCS_SITE_URL_OVERRIDE" ]; then
            html_site_url="$DOCS_SITE_URL_OVERRIDE"
          else
            html_site_url="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}"
          fi
          if [ -n "$TARGET_RELEASE_TAG" ]; then
            pdf_asset=$(gh release view "$TARGET_RELEASE_TAG" --json assets \
              -q '.assets[] | select(.name | endswith(".pdf")) | .name' \
              --repo "$GITHUB_REPOSITORY" 2>/dev/null || true)
            if [ -n "$pdf_asset" ]; then
              pdf_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TARGET_RELEASE_TAG}/${pdf_asset}"
            else
              pdf_url="${html_site_url%/}/pdf/dea_l0_api_reference.pdf"
            fi
          else
            pdf_url="${html_site_url%/}/pdf/dea_l0_api_reference.pdf"
          fi
          python -m compiler.docgen.l0_docgen_blog \
            --input build/docs/markdown \
            --output build/docs/blog-export \
            --docs-prefix "$docs_prefix" \
            --tab-title "$tab_title" \
            --tab-icon "$tab_icon" \
            --tab-order "$tab_order" \
            --html-site-url "$html_site_url" \
            --pdf-url "$pdf_url" \
            --release-tag "$TARGET_RELEASE_TAG"

      - name: Create blog export archive
        run: tar -czf blog-export.tar.gz -C build/docs/blog-export .

      - name: Upload blog export artifact
        uses: actions/upload-artifact@v6
        with:
          name: blog-export
          path: l0/blog-export.tar.gz

      - name: Upload blog export to release
        if: needs.resolve-targets.outputs.target_release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_RELEASE_TAG: ${{ needs.resolve-targets.outputs.target_release_tag }}
        run: gh release upload "$TARGET_RELEASE_TAG" blog-export.tar.gz --clobber --repo "$GITHUB_REPOSITORY"

      - name: Fire repository_dispatch (optional)
        if: vars.BLOG_REPO != ''
        env:
          GH_TOKEN: ${{ secrets.BLOG_PUSH_TOKEN }}
          BLOG_REPO: ${{ vars.BLOG_REPO }}
          TARGET_RELEASE_TAG: ${{ needs.resolve-targets.outputs.target_release_tag }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::BLOG_REPO is set but BLOG_PUSH_TOKEN is missing; skipping dispatch."
            exit 0
          fi
          gh api "repos/$BLOG_REPO/dispatches" \
            -f event_type=blog-docs-update \
            -f "client_payload[release_tag]=$TARGET_RELEASE_TAG" \
            -f "client_payload[source_repo]=$GITHUB_REPOSITORY" \
            -f "client_payload[source_sha]=$GITHUB_SHA"
